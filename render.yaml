services:
  - type: web
    name: dengue-prediction-backend
    env: python
    region: singapore # or ohio/frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: "backend"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
